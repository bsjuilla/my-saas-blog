name: 2 — Publish Article (Auto)

on:
  schedule:
    - cron: '0 10 * * 1,3,5'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Publish article
        env:
          BLOGGER_BLOG_ID:        ${{ secrets.BLOGGER_BLOG_ID }}
          BLOGGER_CLIENT_ID:      ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET:  ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN:  ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          GMAIL_USER:             ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:     ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:           ${{ secrets.NOTIFY_EMAIL }}
          ADSENSE_PUBLISHER_ID:   ${{ secrets.ADSENSE_PUBLISHER_ID }}
          ADSENSE_SLOT_ID:        ${{ secrets.ADSENSE_SLOT_ID }}
        run: python scripts/scheduler.py --action publish
      - name: Save updated drafts.json
        run: |
          git config user.email "bot@blog"
          git config user.name "Blog Bot"
          git add data/drafts.json
          git diff --staged --quiet || git commit -m "🚀 Article published [skip ci]"
          git push
